services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      

  api:
    build: .
      
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONPATH=/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    
    depends_on:
      - db
    volumes:
      - .:/code

volumes:
  postgres_data: